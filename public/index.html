<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tish-learn — learn to code in Tish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/base.css" />
  <link rel="stylesheet" href="/utilities.css" />
  <!-- Set the base for relative imports so deep routes (e.g. /modules/foo)
       still resolve `./dist/...` to the site root. -->
  <base href="/" />
</head>
<body>
  <div id="app"></div>
  <script type="module">
    // Boot wasm-bindgen modules and expose the helpers tish-ide-panels needs.
    // Absolute paths so deep History-API routes still resolve correctly.
    window.__tishDecodeB64 = (b64) => Uint8Array.from(atob(b64), (c) => c.charCodeAt(0))

    const vmMod = await import("/dist/tish_vm.js")
    await vmMod.default()
    window.__tishVmRunCaptured = (chunk) => {
      const lines = []
      const orig = console.log
      console.log = (...args) => { lines.push(args.map(String).join(" ")); orig.apply(console, args) }
      try { vmMod.run(chunk) } catch (e) { lines.push("Runtime: " + String(e)) }
      finally { console.log = orig }
      return lines
    }

    const compilerMod = await import("/dist/tish_compiler.js")
    await compilerMod.default()
    window.__tishCompileToBytecode = compilerMod.compile_to_bytecode
    window.__tishCompileToJs = compilerMod.compile_to_js
    window.__tishCompileToBytecodeWithImports = compilerMod.compile_to_bytecode_with_imports
    window.__tishCompileToJsWithImports = compilerMod.compile_to_js_with_imports

    await import("/dist/learn.js")
  </script>
</body>
</html>
